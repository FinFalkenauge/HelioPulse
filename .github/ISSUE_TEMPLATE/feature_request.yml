name: Feature Request
description: Suggest a new feature for HelioPulse
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should the app do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Live Dashboard
        - Trends
        - Forecast
        - Bluetooth
        - Design System
        - Data Model
    validations:
      required: true
