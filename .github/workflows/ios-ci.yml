name: iOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: xcodebuild -project HelioPulse.xcodeproj -scheme HelioPulse -destination 'generic/platform=iOS' build CODE_SIGNING_ALLOWED=NO
